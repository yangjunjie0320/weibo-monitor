# weibo-monitor 配置模板。复制为 config.yaml 并填入真实值（config.yaml 不入 git）。
# 所有键支持 WEIBO_MONITOR_ 前缀的环境变量覆盖。

# 飞书自建应用凭证（必填）。需要权限：im:message（发消息）、im:resource（传图）、
# im:chat:readonly（--list-chats 列群）。
app_id: "cli_xxx"
app_secret: "xxx"

# 推送目标群 chat_id（oc_xxx）。把机器人拉进群后跑
#   uv run python main.py --list-chats
# 从输出里挑。
chat_id: ""

# 监控账号清单与状态文件
accounts_file: "accounts.yaml"
state_file: "state/seen.json"

# 轮询节奏
poll_interval_seconds: 600      # 每轮间隔（秒）
max_post_age_hours: 24          # 超过此时长的帖子不再推送（防旧帖刷屏）
max_pages_per_account: 3        # 每账号每轮最多翻页数
seen_mids_per_account: 200      # 每账号在 state 里保留的已见 mid 数

# 反爬节流：账号间随机延迟区间（秒）
account_delay_min_seconds: 2.0
account_delay_max_seconds: 4.0
request_timeout: 20.0
request_retries: 3

# 飞书发送重试次数
send_retry_attempts: 3

log_level: INFO
log_dir: logs
